<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>जनावर ॲड करा - दुग्ध दिशा AI</title>
    <style>
        :root {
            --primary: #2e7d32;
            --primary-dark: #1b5e20;
            --accent: #ff9800;
            --bg-color: #e0e5ec;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 0;
            color: var(--text-dark);
            padding-bottom: 30px;
        }

        .app-bar {
            background: linear-gradient(145deg, #2e7d32, #246428);
            color: white;
            padding: 20px 15px;
            display: flex;
            align-items: center;
            box-shadow: 0 10px 20px rgba(46, 125, 50, 0.3);
            border-radius: 0 0 25px 25px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            color: white;
            text-decoration: none;
            font-size: 24px;
            margin-right: 15px;
            font-weight: bold;
        }

        .app-bar h2 { margin: 0; font-size: 20px; }

        .form-container { margin: 30px 20px; }
        .form-card {
            background: #e0e5ec;
            border-radius: 20px;
            padding: 25px 20px;
            box-shadow: 9px 9px 16px rgb(163,177,198,0.6), -9px -9px 16px rgba(255,255,255, 0.5);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block; font-size: 14px; font-weight: 800; color: #555; margin-bottom: 8px;
        }

        .form-control {
            width: 100%; padding: 15px; font-size: 15px; font-weight: 600;
            background: #e0e5ec; border: none; border-radius: 15px; box-sizing: border-box;
            box-shadow: inset 6px 6px 10px 0 rgba(163, 177, 198, 0.7), inset -6px -6px 10px 0 rgba(255, 255, 255, 0.8);
            outline: none; transition: all 0.3s ease;
        }

        .form-control:focus {
            box-shadow: inset 2px 2px 5px 0 rgba(163, 177, 198, 0.7), inset -2px -2px 5px 0 rgba(255, 255, 255, 0.8), 0 0 0 2px rgba(46, 125, 50, 0.3);
        }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .photo-upload-box {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 30px; border-radius: 15px; background: #e0e5ec;
            box-shadow: inset 6px 6px 10px 0 rgba(163, 177, 198, 0.7), inset -6px -6px 10px 0 rgba(255, 255, 255, 0.8);
            cursor: pointer; text-align: center; position: relative; overflow: hidden;
        }
        .photo-upload-box input[type="file"] {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer;
        }

        .upload-icon { font-size: 40px; color: var(--primary); margin-bottom: 10px; }
        .upload-text { font-size: 13px; font-weight: bold; color: #666; }
        
        .preview-img {
            width: 70px; height: 70px; object-fit: cover; border-radius: 8px;
            box-shadow: 0 3px 8px rgba(0,0,0,0.2); position: relative;
        }

        .submit-btn {
            width: 100%; padding: 16px; font-size: 18px; font-weight: 900; color: white;
            background: linear-gradient(145deg, #328636, #2a712d); border: none; border-radius: 15px;
            cursor: pointer; margin-top: 20px; box-shadow: 6px 6px 12px rgba(163, 177, 198, 0.8), -6px -6px 12px rgba(255, 255, 255, 0.8);
        }
        .submit-btn:active {
            box-shadow: inset 4px 4px 10px rgba(0, 0, 0, 0.2), inset -4px -4px 10px rgba(255, 255, 255, 0.1); transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="app-bar">
        <a href="kharedi_vikri.html" class="back-btn">⬅</a>
        <h2>जनावर विकायची माहिती भरा</h2>
    </div>

    <div class="form-container">
        <div class="form-card">
            <form id="addAnimalForm">
                
                <div class="input-grid">
                    <div class="form-group">
                        <label>जनावराचा प्रकार</label>
                        <select class="form-control" id="animalType" required>
                            <option value="">निवडा...</option>
                            <option value="गाय">गाय</option>
                            <option value="म्हैस">म्हैस</option>
                            <option value="शेळी">शेळी</option>
                            <option value="बैल">बैल</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>जात (Breed)</label>
                        <input type="text" class="form-control" id="animalBreed" placeholder="उदा. जर्सी" required>
                    </div>
                </div>

                <div class="input-grid">
                    <div class="form-group">
                        <label>दूध क्षमता (लिटर/दिवस)</label>
                        <input type="number" class="form-control" id="animalMilk" placeholder="उदा. 15">
                    </div>
                    <div class="form-group">
                        <label>वेत (Lactation)</label>
                        <input type="number" class="form-control" id="animalLactation" placeholder="उदा. 1, 2">
                    </div>
                </div>

                <div class="input-grid">
                    <div class="form-group">
                        <label>गाभण आहे का?</label>
                        <select class="form-control" id="animalPregnant">
                            <option value="">निवडा...</option>
                            <option value="नाही">नाही</option>
                            <option value="होय">होय</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>दात (Teeth)</label>
                        <select class="form-control" id="animalTeeth">
                            <option value="">निवडा...</option>
                            <option value="२ दात">२ दात</option>
                            <option value="४ दात">४ दात</option>
                            <option value="६ दात">६ दात</option>
                            <option value="जुळली">जुळली</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>किंमत (₹) *</label>
                    <input type="number" class="form-control" id="animalPrice" placeholder="अपेक्षित किंमत" style="font-size: 20px; color: #2e7d32;" required>
                </div>

                <div class="form-group">
                    <label>तुमचा पत्ता (गाव/तालुका) *</label>
                    <input type="text" class="form-control" id="animalLocation" placeholder="उदा. सातारा" required>
                </div>

                <div class="form-group">
                    <label>मोबाईल नंबर *</label>
                    <input type="tel" class="form-control" id="animalMobile" placeholder="10 अंकी नंबर" pattern="[0-9]{10}" required>
                </div>

                <div class="form-group">
                    <label>जनावराचे फोटो (जास्तीत जास्त ४) *</label>
                    <div class="photo-upload-box">
                        <div class="upload-icon">📸</div>
                        <div class="upload-text">+ आणखी फोटो ॲड करा</div>
                        <input type="file" id="animalImage" accept="image/*" multiple onchange="previewImages(event)">
                    </div>
                    <div id="imagePreviewContainer" style="display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;"></div>
                </div>

                <button type="submit" class="submit-btn">✅ जाहिरात पब्लिश करा</button>
            </form>
        </div>
    </div>

    <script>
        let uploadedImagesBase64 = [];

        function previewImages(event) {
            const files = event.target.files;
            const container = document.getElementById('imagePreviewContainer');

            // चेक करा ४ पेक्षा जास्त फोटो होत नाहीत ना
            if (uploadedImagesBase64.length + files.length > 4) {
                alert("⚠️ तुम्ही एकूण जास्तीत जास्त ४ फोटो सिलेक्ट करू शकता.");
                return;
            }

            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.className = 'preview-img';
                        container.appendChild(img);
                        uploadedImagesBase64.push(e.target.result); 
                    }
                    reader.readAsDataURL(file);
                }
            }
            event.target.value = ""; // रीसेट करा म्हणजे युजर पुन्हा त्याच फाईलवर क्लिक करून ॲड करू शकतो
        }

        document.getElementById('addAnimalForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            
            if (uploadedImagesBase64.length === 0) {
                alert("कृपया किमान १ फोटो अपलोड करा.");
                return;
            }

            const newAnimal = {
                id: Date.now(), 
                type: document.getElementById('animalType').value,
                breed: document.getElementById('animalBreed').value,
                milk: document.getElementById('animalMilk').value,
                lactation: document.getElementById('animalLactation').value,
                pregnant: document.getElementById('animalPregnant').value,
                teeth: document.getElementById('animalTeeth').value,
                price: document.getElementById('animalPrice').value,
                location: document.getElementById('animalLocation').value,
                mobile: document.getElementById('animalMobile').value,
                images: uploadedImagesBase64, 
                status: 'active', // नवीन जाहिरात ॲक्टिव्ह राहील
                isUrgent: false 
            };

            let currentAnimals = JSON.parse(localStorage.getItem('market_animals')) || [];
            currentAnimals.unshift(newAnimal); 
            localStorage.setItem('market_animals', JSON.stringify(currentAnimals));

            alert("🎉 जनावराची जाहिरात यशस्वीरित्या ॲड झाली आहे!");
            window.location.href = "kharedi_vikri.html";
        });
    </script>

</body>
</html>
