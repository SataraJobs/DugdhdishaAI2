<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>दुग्ध दिशा AI - चारा नोंदणी</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stats-row { display: flex; gap: 10px; margin: 15px 20px; }
        .stat-box {
            flex: 1; background: #fff; padding: 15px 10px; border-radius: 12px;
            text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border-bottom: 4px solid #1976d2;
        }
        .stat-box h3 { margin: 0; font-size: 18px; color: #333; }
        .stat-box p { margin: 5px 0 0; font-size: 11px; color: #666; font-weight: bold; }
        
        .form-section {
            background: #eef2f5; padding: 20px; margin: 15px 20px; border-radius: 16px;
            box-shadow: inset 4px 4px 8px rgba(0,0,0,0.05), inset -4px -4px 8px rgba(255,255,255,1);
        }
        .form-section label { display: block; font-weight: bold; color: #333; margin-bottom: 8px; font-size: 13px; }
        select, input {
            width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px;
            background: #fff; box-sizing: border-box; font-family: inherit; font-size: 14px; margin-bottom: 15px;
        }

        .btn-primary {
            background: linear-gradient(145deg, #1b5e20, #2e7d32); color: white; width: 100%;
            padding: 15px; border: none; border-radius: 12px; font-size: 15px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #144d18; margin-top: 5px;
        }
        .btn-primary:active { top: 4px; box-shadow: 0 1px 0 #144d18; position: relative; }
        
        .btn-danger {
            background: linear-gradient(145deg, #d32f2f, #b71c1c); color: white; width: 100%;
            padding: 15px; border: none; border-radius: 12px; font-size: 15px; font-weight: bold;
            cursor: pointer; box-shadow: 0 4px 0 #7f0000; margin-top: 15px; display: none;
        }
        .btn-danger:active { top: 4px; box-shadow: 0 1px 0 #7f0000; position: relative; }

        /* History List */
        .history-list { margin: 0 20px 20px; }
        .history-card {
            background: #fff; padding: 15px; border-radius: 10px; margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-left: 5px solid #ccc;
            display: flex; justify-content: space-between; align-items: center;
        }
        .history-card.in { border-left-color: #4caf50; } /* Green for Stock In */
        .history-card.out { border-left-color: #f44336; } /* Red for Stock Out */
        
        .history-info h4 { margin: 0 0 5px; font-size: 14px; color: #333; }
        .history-info p { margin: 0; font-size: 11px; color: #666; }
        .history-qty { font-weight: bold; font-size: 15px; }
        .history-qty.in { color: #2e7d32; }
        .history-qty.out { color: #c62828; }

        /* 🔥 Dynamic Ad Box styling */
        .ad-container { margin: 0 20px 15px; display: none; }
        .ai-recommendation-box { background: linear-gradient(145deg, #fff9c4, #fff176); border: 1px dashed #fbc02d; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.06); cursor: pointer; position: relative; }
        .ai-recommendation-box h4 { margin: 0 0 5px; color: #f57f17; font-size: 14px; display: flex; align-items: center; gap: 5px; }
        .ai-recommendation-box p { margin: 0; font-size: 12px; color: #444; line-height: 1.4; font-weight: bold; }
        .sponsor-tag { font-size: 9px; background: rgba(0,0,0,0.1); padding: 3px 8px; border-radius: 4px; color: #333; margin-top: 8px; display: inline-block; font-weight: bold; }
        .ad-badge { position: absolute; top: -8px; right: -8px; background: #d32f2f; color: white; padding: 2px 6px; font-size: 9px; border-radius: 10px; font-weight: bold; border: 2px solid white;}
    </style>
</head>
<body>

<div class="app-container">
    
    <div class="top-dashboard" style="background: #2e7d32; padding-bottom: 20px; border-radius: 0 0 20px 20px;">
        <a href="index.html" style="color: white; text-decoration: none; font-size: 14px;">⬅️ मुख्य डॅशबोर्ड</a>
        <div class="header-titles" style="margin-top: 15px;">
            <h1 style="color: white;">चारा व खाद्य नोंदणी 🥬</h1>
            <p style="color: #e8f5e9;">गोठ्यातील इन्व्हेंटरी आणि स्टॉक मॅनेजमेंट</p>
        </div>
    </div>

    <!-- Current Stock Display -->
    <div class="category-title" style="margin-top: 20px; font-weight: bold; font-size: 16px; color: #1b5e20; border-left: 5px solid #ff9800; padding-left: 10px; margin-left: 20px;">📦 गोठ्यातील शिल्लक साठा</div>
    <div class="stats-row">
        <div class="stat-box" style="border-color: #4caf50;">
            <h3 id="stock_green">० Kg</h3><p>हिरवा चारा</p>
        </div>
        <div class="stat-box" style="border-color: #ffb300;">
            <h3 id="stock_dry">० Kg</h3><p>सुका चारा</p>
        </div>
        <div class="stat-box" style="border-color: #1976d2;">
            <h3 id="stock_conc">० Kg</h3><p>पशुखाद्य / पेंड</p>
        </div>
    </div>

    <!-- Entry Form -->
    <div class="category-title" style="font-weight: bold; font-size: 16px; color: #1b5e20; border-left: 5px solid #ff9800; padding-left: 10px; margin-left: 20px; margin-top: 20px;">📝 नवीन नोंद करा</div>
    <div class="form-section">
        <label>नोंदीचा प्रकार:</label>
        <select id="entry_type" onchange="toggleCostField()">
            <option value="in">🟢 खरेदी / नवीन साठा आला (Stock IN)</option>
            <option value="out">🔴 रोजचा वापर / साठा संपला (Stock OUT)</option>
        </select>

        <label>चाऱ्याचा गट (Category):</label>
        <select id="fodder_category" onchange="showContextualAd()">
            <option value="none">-- गट निवडा --</option>
            <option value="green">हिरवा चारा / मुरघास</option>
            <option value="dry">सुका चारा (कडबा/भुसा)</option>
            <option value="conc">पशुखाद्य व पेंड (Concentrates)</option>
        </select>

        <label>चाऱ्याचे/खाद्याचे नाव:</label>
        <input type="text" id="fodder_name" placeholder="उदा. मका मुरघास, सरकी पेंड...">

        <label>वजन (किलोमध्ये):</label>
        <input type="number" id="fodder_qty" placeholder="उदा. 500">

        <div id="cost_section">
            <label>एकूण खर्च (रुपये) - ऐच्छिक:</label>
            <input type="number" id="fodder_cost" placeholder="उदा. 4500">
        </div>

        <button class="btn-primary" id="btn_save" onclick="saveTransaction()">💾 साठा अपडेट करा</button>
        <button class="btn-danger" id="btn_deduct" onclick="saveTransaction()">➖ साठ्यातून वजा करा</button>
    </div>

    <!-- 🔥 DYNAMIC AD CONTAINER -->
    <div class="ad-container" id="dynamic_ad_box"></div>

    <!-- History -->
    <div class="category-title" style="font-weight: bold; font-size: 16px; color: #1b5e20; border-left: 5px solid #ff9800; padding-left: 10px; margin-left: 20px; margin-top: 20px;">🕒 मागील नोंदी (इतिहास)</div>
    <div class="history-list" id="history_list">
        <!-- Records will load here -->
    </div>

</div>

<script>
    // Toggle button color and cost field based on In/Out
    function toggleCostField() {
        let type = document.getElementById('entry_type').value;
        if(type === 'in') {
            document.getElementById('cost_section').style.display = 'block';
            document.getElementById('btn_save').style.display = 'block';
            document.getElementById('btn_deduct').style.display = 'none';
        } else {
            document.getElementById('cost_section').style.display = 'none';
            document.getElementById('btn_save').style.display = 'none';
            document.getElementById('btn_deduct').style.display = 'block';
        }
        showContextualAd(); // Refresh ad logic if type changes
    }

    // --- 🔥 SMART CONTEXTUAL AD LOGIC ---
    function showContextualAd() {
        let category = document.getElementById('fodder_category').value;
        let entryType = document.getElementById('entry_type').value;
        let adBox = document.getElementById('dynamic_ad_box');
        
        if (category === "none") {
            adBox.style.display = 'none';
            return;
        }

        let adHtml = "";

        if (category === "conc") {
            if (entryType === "in") {
                // If buying concentrate, suggest mineral mixture to go with it
                adHtml = `
                    <div class="ai-recommendation-box" onclick="window.location.href='krushi_mall.html'">
                        <span class="ad-badge">Offer</span>
                        <h4>🥣 पशुखाद्यासोबत हे नक्की घ्या!</h4>
                        <p>पशुखाद्यात <b>गोदरेज मिनरल मिक्सचर (Gold)</b> मिसळल्यास दुधाची फॅट आणि SNF लगेच वाढते. आजच कृषी मॉलवरून ऑर्डर करा.</p>
                        <span class="sponsor-tag">Sponsored by Godrej Agrovet</span>
                        <span style="font-size:11px; float:right; color:#e65100; font-weight:bold; margin-top:8px;">खरेदी करा ➔</span>
                    </div>`;
            } else {
                // If stock is OUT (getting empty), suggest buying more
                adHtml = `
                    <div class="ai-recommendation-box" onclick="window.location.href='krushi_mall.html'">
                        <span class="ad-badge">Stock Alert</span>
                        <h4>🛒 पशुखाद्य संपत आहे का?</h4>
                        <p>कृषी मॉलमध्ये <b>गोदावरी फिड्स</b> च्या मिल्क पेलेटवर सध्या <b>१५% सूट</b> सुरू आहे. घरपोच डिलिव्हरी मिळवा.</p>
                        <span class="sponsor-tag">Sponsored by Godavari Feeds</span>
                        <span style="font-size:11px; float:right; color:#e65100; font-weight:bold; margin-top:8px;">ऑर्डर करा ➔</span>
                    </div>`;
            }
        } 
        else if (category === "green" || category === "dry") {
            // Fodder machinery or seeds ad
            adHtml = `
                <div class="ai-recommendation-box" onclick="window.location.href='krushi_mall.html'">
                    <span class="ad-badge">Ad</span>
                    <h4>🚜 चारा कापणी सोपी करा!</h4>
                    <p><b>अल्फा लाव्हल</b> ची नवीन उच्च दर्जाची 'चाफ कटर (Chaff Cutter) मशीन' आता सवलतीच्या दरात उपलब्ध. चाऱ्याची नासाडी टाळा.</p>
                    <span class="sponsor-tag">Sponsored by Alfa Laval</span>
                    <span style="font-size:11px; float:right; color:#e65100; font-weight:bold; margin-top:8px;">किंमत पहा ➔</span>
                </div>`;
        }

        adBox.innerHTML = adHtml;
        adBox.style.display = 'block';
    }

    // Save Data to LocalStorage
    function saveTransaction() {
        let type = document.getElementById('entry_type').value;
        let category = document.getElementById('fodder_category').value;
        let name = document.getElementById('fodder_name').value.trim();
        let qty = parseFloat(document.getElementById('fodder_qty').value);
        let cost = parseFloat(document.getElementById('fodder_cost').value) || 0;
        let date = new Date().toLocaleDateString('mr-IN');

        if(category === "none") {
            alert("कृपया चाऱ्याचा गट निवडा.");
            return;
        }

        if(!name || !qty || qty <= 0) {
            alert("कृपया चाऱ्याचे नाव आणि योग्य वजन टाका!");
            return;
        }

        let transaction = {
            id: Date.now(),
            date: date,
            type: type, // 'in' or 'out'
            category: category,
            name: name,
            qty: qty,
            cost: (type === 'in') ? cost : 0
        };

        // Get existing history
        let history = JSON.parse(localStorage.getItem('feed_history')) || [];
        history.unshift(transaction); // Add to top
        localStorage.setItem('feed_history', JSON.stringify(history));

        // Clear Form
        document.getElementById('fodder_name').value = '';
        document.getElementById('fodder_qty').value = '';
        document.getElementById('fodder_cost').value = '';
        document.getElementById('fodder_category').value = 'none';
        document.getElementById('dynamic_ad_box').style.display = 'none'; // Hide ad

        alert(type === 'in' ? "✅ नवीन साठा यशस्वीरित्या ॲड झाला!" : "✅ वापरलेला साठा वजा झाला!");
        loadDashboard();
    }

    // Load Dashboard Stats and History
    function loadDashboard() {
        let history = JSON.parse(localStorage.getItem('feed_history')) || [];
        
        let totals = { green: 0, dry: 0, conc: 0 };
        let listHTML = "";

        if(history.length === 0) {
            listHTML = "<p style='text-align:center; color:#888;'>अद्याप कोणतीही नोंद नाही.</p>";
        }

        history.forEach(tx => {
            // Calculate Totals
            if(tx.type === 'in') {
                totals[tx.category] += tx.qty;
            } else if(tx.type === 'out') {
                totals[tx.category] -= tx.qty;
            }

            // Generate History List UI
            let catName = (tx.category === 'green') ? "हिरवा चारा" : (tx.category === 'dry') ? "सुका चारा" : "पशुखाद्य";
            let sign = (tx.type === 'in') ? "+" : "-";
            let cssClass = (tx.type === 'in') ? "in" : "out";
            let costStr = (tx.type === 'in' && tx.cost > 0) ? ` | खर्च: ₹${tx.cost}` : "";

            listHTML += `
                <div class="history-card ${cssClass}">
                    <div class="history-info">
                        <h4>${tx.name}</h4>
                        <p>${tx.date} | ${catName}${costStr}</p>
                    </div>
                    <div class="history-qty ${cssClass}">${sign}${tx.qty} Kg</div>
                </div>
            `;
        });

        // Prevent negative stock visually
        if(totals.green < 0) totals.green = 0;
        if(totals.dry < 0) totals.dry = 0;
        if(totals.conc < 0) totals.conc = 0;

        // Update UI
        document.getElementById('stock_green').innerText = totals.green + " Kg";
        document.getElementById('stock_dry').innerText = totals.dry + " Kg";
        document.getElementById('stock_conc').innerText = totals.conc + " Kg";
        
        document.getElementById('history_list').innerHTML = listHTML;
    }

    // Load data on start
    window.onload = loadDashboard;
</script>

</body>
</html>
